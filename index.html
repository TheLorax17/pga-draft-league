<style>
  * { box-sizing: border-box; }

  :root {
    --bg-0: #111713;
    --bg-1: #171f1a;
    --bg-2: #202922;
    --panel: #1b231e;
    --panel-2: #222c25;
    --text: #e8eee9;
    --muted: #9aa89f;
    --border: #354139;
    --green: #82a856;
    --green-bright: #a6d96a;
    --amber: #d7a441;
    --danger: #a33a32;
    --black: #090d0a;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(130, 168, 86, 0.18), transparent 28%),
      radial-gradient(circle at bottom right, rgba(215, 164, 65, 0.10), transparent 30%),
      linear-gradient(135deg, #0b100d, #18211b 55%, #111713);
    color: var(--text);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: linear-gradient(to bottom, black, transparent 85%);
  }

  button, input, textarea {
    font: inherit;
  }

  button {
    border: 1px solid rgba(166, 217, 106, 0.35);
    cursor: pointer;
    border-radius: 6px;
    padding: 12px 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: linear-gradient(180deg, #6f9249, #4f6f35);
    color: #f4ffe9;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  }

  button:hover {
    background: linear-gradient(180deg, #8aad5d, #5d7f3e);
  }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  input,
  textarea {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    background: #121914;
    color: var(--text);
  }

  input::placeholder,
  textarea::placeholder {
    color: #7d8a82;
  }

  textarea {
    width: 100%;
    min-height: 180px;
    resize: vertical;
    line-height: 1.4;
  }

  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 18px;
    position: relative;
    z-index: 1;
  }

  #login-box {
    max-width: 440px;
    margin: 12vh auto;
    padding: 32px;
    text-align: center;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  }

  #login-box h1 {
    color: var(--green-bright);
    margin: 0 0 8px;
    font-size: 34px;
    letter-spacing: -0.03em;
  }

  #login-box p {
    color: var(--muted);
  }

  #pin {
    width: 100%;
    margin: 18px 0 12px;
    text-align: center;
    font-size: 24px;
    letter-spacing: 7px;
  }

  #login-btn {
    width: 100%;
  }

  .shell {
    background: rgba(18, 25, 20, 0.96);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
    overflow: hidden;
  }

  .topbar {
    padding: 30px;
    background:
      linear-gradient(90deg, rgba(9,13,10,0.94), rgba(31,44,35,0.96)),
      repeating-linear-gradient(
        135deg,
        rgba(166,217,106,0.08) 0,
        rgba(166,217,106,0.08) 1px,
        transparent 1px,
        transparent 12px
      );
    color: white;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .topbar::after {
    content: "LIVE DRAFT SYSTEM";
    position: absolute;
    right: 28px;
    top: 28px;
    color: var(--amber);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.12em;
  }

  .topbar h1 {
    margin: 0;
    font-size: 40px;
    letter-spacing: -0.05em;
    color: #f1f6ef;
  }

  .topbar p {
    margin: 8px 0 0;
    color: var(--muted);
  }

  .content {
    padding: 24px;
  }

  nav {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: #161f19;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .tab-btn:hover {
    background: #223026;
    color: var(--green-bright);
  }

  section {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .section-header h2 {
    margin: 0 0 6px;
    font-size: 26px;
    color: var(--text);
  }

  .section-header p {
    margin: 0;
    color: var(--muted);
  }

  .upload-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .upload-box label {
    color: var(--muted);
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .odds-import-box {
    background: #151d18;
    border: 1px solid var(--border);
    border-left: 4px solid var(--amber);
    border-radius: 10px;
    padding: 18px;
    margin: 18px 0;
  }

  .odds-import-box h3 {
    margin: 0 0 8px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .odds-import-box p {
    color: var(--muted);
    margin: 0 0 12px;
  }

  .import-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  #clear-odds-btn {
    background: linear-gradient(180deg, #4b5563, #303740);
    border-color: #56616d;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap: 12px;
    margin: 18px 0;
  }

  .stat-card {
    background: linear-gradient(180deg, #202a23, #161f19);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: var(--green);
  }

  .stat-card span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-card strong {
    display: block;
    margin-top: 8px;
    font-size: 28px;
    color: var(--green-bright);
  }

  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 18px 0;
  }

  .toolbar input {
    min-width: 260px;
    flex: 1;
  }

  .pill {
    display: inline-flex;
    padding: 8px 11px;
    border-radius: 999px;
    background: #121914;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    background: #121914;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 980px;
  }

  th {
    background: #0b100d;
    color: var(--green-bright);
    text-align: left;
    padding: 14px 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(53, 65, 57, 0.75);
    color: var(--text);
  }

  tbody tr:hover {
    background: rgba(130, 168, 86, 0.08);
  }

  .golfer-name {
    font-weight: 900;
    color: #f2f7f2;
  }

  .muted-cell {
    color: #77857d;
    font-style: italic;
  }

  .odds {
    font-weight: 900;
    color: var(--green-bright);
  }

  .rank-badge {
    display: inline-block;
    padding: 6px 9px;
    border-radius: 999px;
    background: rgba(215, 164, 65, 0.16);
    color: var(--amber);
    border: 1px solid rgba(215, 164, 65, 0.35);
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
  }

  .draft-layout {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 18px;
    align-items: start;
  }

  .available-panel,
  .teams-panel,
  .draft-setup-card {
    background: #151d18;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }

  #available-list,
  #team-a-roster,
  #team-b-roster {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  #available-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 10px;
  }

  #available-list button {
    width: 100%;
    text-align: left;
    background: #111713;
    color: var(--green-bright);
    border: 1px solid var(--border);
  }

  #available-list button:hover {
    border-color: var(--green-bright);
    background: #1d2a20;
  }

  .team-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    background: #111713;
  }

  .team-card h4 {
    margin: 0 0 12px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .team-card li {
    background: #1a231d;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-weight: 800;
    color: var(--text);
  }

  #turn-indicator {
    background: rgba(130, 168, 86, 0.16);
    color: var(--green-bright);
    padding: 16px;
    border-radius: 10px;
    border: 1px solid rgba(166, 217, 106, 0.35);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  #reset-draft-btn {
    background: linear-gradient(180deg, #a33a32, #762720);
    border-color: #bd5148;
  }

  #status,
  #upload-status,
  #odds-status {
    font-weight: 900;
    color: var(--green-bright);
  }

  @media (max-width: 850px) {
    .topbar::after {
      position: static;
      display: block;
      margin-top: 12px;
    }

    .stat-grid,
    .draft-layout {
      grid-template-columns: 1fr;
    }

    .toolbar input {
      min-width: 100%;
    }

    nav button {
      flex: 1;
    }
  }
</style>
